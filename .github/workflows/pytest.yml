name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/pytest.yml'
  push:
    branches: [main, develop/**]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/pytest.yml'
  workflow_dispatch:

env:
  FORCE_COLOR: 1
  RUFF_OUTPUT_FORMAT: github
  COLUMNS: 120
  # Use official PyPI to avoid 403 from mirrors (e.g. tsinghua/aliyun) blocking GitHub Actions IPs.
  UV_INDEX_URL: https://pypi.org/simple/
  # API credentials for real_model tests (configured via secrets).
  # test_pick.py auto-skipped via incompatible_with_thinking marker for
  # thinking-mode models — see issue #84.
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
  TEST_DEFAULT_MODEL: ${{ secrets.TEST_DEFAULT_MODEL }}

jobs:

  lint:
    name: Lint (ruff check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: Run ruff check
        run: uv run ruff check src/ tests/

  format:
    name: Format (ruff format)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: Run mypy
        run: uv run --no-group docs mypy src/

  import-linter:
    name: Import Linter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: Run lint-imports
        run: uv run lint-imports

  smoke:
    name: Smoke (import + collect)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: Import smoke test
        run: |
          uv run python -c "mods=['agentpool','agentpool_config','agentpool_cli','agentpool_commands','agentpool_storage','agentpool_prompts','agentpool_server','agentpool_toolsets','acp'];[(__import__(m),print(f'  OK {m}')) for m in mods];print(f'All {len(mods)} modules imported successfully')"
      - name: Test collection check
        run: uv run pytest --co -q 2>&1 | tail -3

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: Run unit tests
        run: uv run pytest -m "unit and not slow" -n auto --tb=short --no-cov --timeout=60 -q
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: unit-test-results
          path: /tmp/pytest-*.txt
          retention-days: 3

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: Run integration tests
        run: uv run pytest -m "integration and not slow and not vcr" -n auto --tb=short --no-cov --timeout=120 -q
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: integration-test-results
          path: /tmp/pytest-*.txt
          retention-days: 3

  core:
    name: Core tests (non-unit, non-integration)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit, integration]
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: Run core tests
        run: uv run pytest -m "not unit and not integration and not slow and not snapshot and not e2e and not vcr and not real_model and not real_mcp" -n auto --tb=short --no-cov --timeout=180 -q
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: core-test-results
          path: /tmp/pytest-*.txt
          retention-days: 3

  vcr:
    # L3 VCR cassette replay — runs after unit tests pass.
    name: VCR tests (L3 replay)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: VCR tests
        run: uv run pytest tests/vcr/ --strict-vcr-cassette-usage -m "not e2e" --tb=short --no-cov --timeout=120 -q
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: vcr-test-results
          path: /tmp/pytest-*.txt
          retention-days: 3

  cassette-hygiene:
    # Verifies every cassette has a corresponding test (fails if not).
    name: Cassette hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: Check cassettes have tests
        run: python tests/check_cassettes.py
      # Warns if a VCR test has no cassette — does not fail the job.
      - name: Check VCR tests have cassettes
        continue-on-error: true
        run: python tests/check_vcr_tests.py
      - name: Scan cassettes for leaked credentials
        run: python .github/scripts/check_cassette_credentials.py
      - name: Check no mock in integration
        run: python tests/check_no_mock_in_integration.py
        continue-on-error: true

  e2e-smoke:
    # L4a smoke: ~30s, PR-blocking. Runs in parallel with other test stages.
    name: E2E smoke (L4a)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
          cache-suffix: py3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-extras --no-group lint
      - name: L4a smoke tests
        run: uv run pytest -m "e2e and not slow" --timeout=60 --tb=short --no-cov -q
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-smoke-results
          path: /tmp/pytest-*.txt
          retention-days: 3

  report:
    name: CI Report
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, import-linter, smoke, unit, integration, core, vcr, cassette-hygiene, e2e-smoke]
    if: always()
    steps:
      - name: Build summary table
        run: |
          echo '## CI Results' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Stage | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-------|--------|' >> $GITHUB_STEP_SUMMARY
          echo '| Lint (ruff check) | ${{ needs.lint.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Format (ruff format) | ${{ needs.format.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Type Check (mypy) | ${{ needs.typecheck.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Import Linter | ${{ needs.import-linter.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Smoke (import + collect) | ${{ needs.smoke.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Unit tests | ${{ needs.unit.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Integration tests | ${{ needs.integration.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Core tests | ${{ needs.core.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| VCR tests (L3 replay) | ${{ needs.vcr.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| Cassette hygiene | ${{ needs.cassette-hygiene.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '| E2E smoke (L4a) | ${{ needs.e2e-smoke.result }} |' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          if [ '${{ needs.lint.result }}' = 'failure' ] || \
             [ '${{ needs.format.result }}' = 'failure' ] || \
             [ '${{ needs.typecheck.result }}' = 'failure' ] || \
             [ '${{ needs.import-linter.result }}' = 'failure' ] || \
             [ '${{ needs.smoke.result }}' = 'failure' ] || \
             [ '${{ needs.unit.result }}' = 'failure' ] || \
             [ '${{ needs.integration.result }}' = 'failure' ] || \
             [ '${{ needs.core.result }}' = 'failure' ] || \
             [ '${{ needs.vcr.result }}' = 'failure' ] || \
             [ '${{ needs.cassette-hygiene.result }}' = 'failure' ] || \
             [ '${{ needs.e2e-smoke.result }}' = 'failure' ]; then
            echo '### Some checks failed' >> $GITHUB_STEP_SUMMARY
            echo 'Download the artifact for test details.' >> $GITHUB_STEP_SUMMARY
          else
            echo '### All checks passed' >> $GITHUB_STEP_SUMMARY
          fi
