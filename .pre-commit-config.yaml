default_language_version:
  python: python3.13
default_stages: [pre-commit]
repos:
  # Phase 1: Fast basic checks (fail early)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    # https://pre-commit.com/hooks.html
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json
      - id: check-xml
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
      - id: detect-private-key
      - id: debug-statements

  # Phase 2: Code formatting (auto-fix, system commands)
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: ruff-fix
        name: ruff-fix
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: tombi-format
        name: tombi-format
        entry: uv run tombi format pyproject.toml
        language: system
        files: ^pyproject\.toml$
        require_serial: true

  # Phase 3: Linting (ruff + config schema check, only staged files, ~2-3s)
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        types: [python]
        require_serial: true
      - id: check-jsonschema
        name: check-jsonschema
        entry: uv run check-jsonschema --schemafile schema/config-schema.json
        language: system
        files: ^src/agentpool/config_resources/.*\.yml$|^docs/examples/.*/config\.yml$
        require_serial: true

  # Phase 4: pre-push — heavier checks, only when pushing (~30-60s)
  # mypy and tests are too slow for per-commit; run on push as a safety net.
  # Full suite (integration/slow/acp_snapshot) still runs in CI.
  - repo: local
    hooks:
      - id: mypy-push
        name: mypy (pre-push)
        entry: uv run mypy --fixed-format-cache
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false
        stages: [pre-push]
      - id: pytest-unit-push
        name: pytest unit (pre-push)
        entry: uv run pytest -m unit -x -q --timeout=60
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

  # Phase 5: Commit message validation (final)
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.9.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
        additional_dependencies: [typing-extensions]
