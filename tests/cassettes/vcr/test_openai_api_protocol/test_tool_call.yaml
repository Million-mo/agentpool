      messages:
      - content: 'You are test_agent.


          You are a helpful test assistant for VCR cassette replay.

          <available-skills>

          <skill name="example-skill" description="A simple example skill that demonstrates
          the basic structure and functionality. Use when you need to show how skills
          work or test skill loading." />

          <skill name="openspec-apply-change" description="Implement tasks from an
          OpenSpec change. Use when the user wants to start implementing, continue
          implementation, or work through tasks." />

          <skill name="openspec-explore" description="Enter explore mode - a thinking
          partner for exploring ideas, investigating problems, and clarifying requirements.
          Use when the user wants to think through something before or during a change."
          />

          <skill name="openspec-archive-change" description="Archive a completed change
          in the experimental workflow. Use when the user wants to finalize and archive
          a change after implementation is complete." />

          <skill name="openspec-propose" description="Propose a new change with all
          artifacts generated in one step. Use when the user wants to quickly describe
          what they want to build and get a complete proposal with design, specs,
          and tasks ready for implementation." />

          <skill name="systematic-debugging" description="Use when encountering any
          bug, test failure, or unexpected behavior, before proposing fixes" />

          <skill name="metaskill" description="The meta-skill: create AI agent teams,
          individual agents, or custom skills for any project. Use when the user wants
          to generate a complete .claude/ agent team, create a single agent, or create
          a single skill." />

          <skill name="uv-package-manager" description="Master the uv package manager
          for fast Python dependency management, virtual environments, and modern
          Python project workflows. Use when setting up Python projects, managing
          dependencies, or optimizing Python development workflows with uv." />

          <skill name="darwin-skill" description="Darwin Skill (达尔文.skill): autonomous
          skill optimizer inspired by Karpathy&#x27;s autoresearch. Evaluates SKILL.md
          files using an 8-dimension rubric (structure + effectiveness), runs hill-climbing
          with git version control, validates improvements through test prompts, and
          generates visual result cards. Use when user mentions &quot;优化skill&quot;,
          &quot;skill评分&quot;, &quot;自动优化&quot;, &quot;auto optimize&quot;, &quot;skill质量检查&quot;,
          &quot;达尔文&quot;, &quot;darwin&quot;, &quot;帮我改改skill&quot;, &quot;skill怎么样&quot;,
          &quot;提升skill质量&quot;, &quot;skill review&quot;, &quot;skill打分&quot;." />

          <skill name="brainstorm-okrs" description="Brainstorm team-level OKRs aligned
          with company objectives -- qualitative objectives with measurable key results.
          Use when setting quarterly OKRs, aligning team goals with company strategy,
          drafting objectives, or learning how to write effective OKRs." />

          <skill name="code-review-expert" description="Expert code review of current
          git changes with a senior engineer lens. Detects SOLID violations, security
          risks, and proposes actionable improvements." />

          </available-skills>'
        role: system
      - content:
        - text: Use the echo tool to say hi.
          type: text
        role: user
      model: svc/deepseek-v4-flash
      stream: true
      stream_options:
        include_usage: true
      tool_choice: auto
      tools:
      - function:
          description: "Load a Claude Code Skill and return its instructions.\n\n\
            Args:\n    ctx: Agent context providing access to pool and skills\n  \
            \  skill_name: Name of the skill to load, or a skill:// URI.\n       \
            \ Use skill:// URI to load a specific reference file:\n        skill://skill-name/references/file.md\n\
            \    arguments: Optional space-separated arguments for substitution\n\n\
            Returns:\n    The full skill instructions for execution"
          name: load_skill
          parameters:
            additionalProperties: false
            properties:
              arguments:
                anyOf:
                - type: string
                - type: 'null'
                default: null
                description: Optional space-separated arguments for substitution
              skill_name:
                description: 'Name of the skill to load, or a skill:// URI.

                  Use skill:// URI to load a specific reference file:

                  skill://skill-name/references/file.md'
                type: string
            required:
            - skill_name
            type: object
        type: function
      - function:
          description: "List all available skills.\n\nReturns:\n    Formatted list\
            \ of available skills with descriptions and URI information"
          name: list_skills
          parameters:
            additionalProperties: false
            properties: {}
            type: object
        type: function
